# hernes 憲法（機械可読版） — 立法(rules)/司法(checks)/行政(harness) すべてが準拠する最上位 SSOT。
# 散文版は docs/constitution.md。改正は人間のみ可（AI は提案まで）。
# 普遍的な開発原則。三権すべてがこれに準拠する（principle id は rules.constitution から参照される）。
version: 1
title: hernes 憲法
amendableBy: human-only
principles:
  - id: C1
    name: ユーザー価値が最優先
    statement: すべての機能はユーザーの課題に対応づく。社内都合だけでは不十分。
  - id: C2
    name: テストファースト
    statement: 新しい挙動は実装より前にテストを書く。バグ修正にはリグレッションテストを付ける。
  - id: C3
    name: 小さな変更
    statement: 大きな書き直しより、小さくレビュー可能な独立した変更を好む。
  - id: C4
    name: 観測可能な挙動
    statement: 重要なフローはログ・メトリクス・トレースを持ち、失敗は診断可能である。
  - id: C5
    name: セキュリティとプライバシー
    statement: ソースに秘密情報を置かない。機微データ・秘密値をログに出さない。認可はテストで担保する。
  - id: C6
    name: 設計書・仕様が真実の源
    statement: >-
      人手の設計書・仕様が要件の起点。実装と仕様の乖離を黙認しない。
      メッセージ・列挙値・バリデーション規則は @hernes/shared に単一定義する。
