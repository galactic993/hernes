id: R010
title: 静的クラウド資格情報の禁止（WIF 一択 / SA JSON キー禁止）
constitution: [C5]
statement: >-
  CI/IaC に SA JSON キー・埋め込み秘密鍵・--key-file を置かない。GCP 認証は WIF（短命 OIDC）、
  secret は Secret Manager を source of truth とする（development-harness §21）。
severity: error
status: active
jurisdiction:
  include: [.github/**, infra/**]
checks:
  - kind: deterministic
    id: no-static-cloud-credentials
