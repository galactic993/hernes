id: R003
title: 秘密値・機微情報をログに出さない
constitution: [C5]
statement: >-
  DATABASE_URL / CLERK_SECRET_KEY / CLERK_WEBHOOK_SECRET / APP_SECRET / REDIS_AUTH_STRING 等の
  秘密値を console / logger に渡さない。個人情報もログに出さない。
severity: error
status: active
jurisdiction:
  include: [apps/**, packages/**]
  exclude: ["**/test/**", "**/*.test.ts", "**/*.test.tsx"]
checks:
  - kind: deterministic
    id: no-secret-in-logs
  - kind: semantic
    id: pii-in-logs
