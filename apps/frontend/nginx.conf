# hernes frontend nginx config (Cloud Run, listen 8080)
# /etc/nginx/conf.d/default.conf として配置される。

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 圧縮（テキスト系アセット）
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ヘルスチェック（Cloud Run / LB 用）。即 200 を返す。
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Vite が出力するハッシュ付きアセットは内容不変 → 長期 immutable キャッシュ
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA: 実ファイルが無ければ index.html へフォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html は常に最新を取得させる（デプロイ反映のため no-cache）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
