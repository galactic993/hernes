# ci.yml — Pull Request / push(main,develop) で回す検証ゲート。
#
# 規約:
# - backend は Hono(TypeScript)。Java/Spring/Flyway/actuator は使わない。
# - pnpm(10) + Node 22 LTS。
# - lint は biomejs/setup-biome@v2 + `biome ci .`、続けて typecheck / test / build。
# - Dockerfile が build できるか（secret 不要範囲）を最後に検証する。
# - クラウドへはデプロイしない。GCP 認証も不要なので id-token は要求しない。
# - secret をログに出さない / set -x は使わない。
name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

# クラウド認証は不要。最小権限（読み取りのみ）。
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Biome は専用 action で導入し、CI モード（書き込みなし・差分で失敗）で実行。
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Lint (biome ci)
        run: biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # 統治ゲート（三権分立 / HOTL）: 立法↔司法↔仕様↔SSOT の整合を機械判定。
      # 「書かれている」ではなく「効いている」を CI で強制する（違反で落ちる）。
      - name: Governance gate (三権分立)
        run: pnpm govern

      # build スクリプトを持つワークスペースのみビルド（--if-present）。
      - name: Build (workspaces with a build script)
        run: pnpm -r --if-present build

  docker-build:
    name: docker build verification (FE/BE)
    runs-on: ubuntu-latest
    # イメージのレジストリ push はしない。Dockerfile が通るかの検証のみ。
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # backend: Hono(TS) / 8080 listen / health GET /healthz / 実行は tsx。
      # secret は build に不要な範囲のみ。push: false で検証だけ行う。
      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          load: false
          tags: hernes-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # frontend: React+Vite → nginx で 8080 配信。
      # CI 検証用の VITE_* はダミー値（機密を含めない / CLERK_SECRET_KEY は渡さない）。
      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          load: false
          tags: hernes-frontend:ci
          build-args: |
            VITE_APP_ENV=ci
            VITE_API_BASE_URL=http://localhost:8080
            VITE_CLERK_PUBLISHABLE_KEY=pk_test_ci_placeholder
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
