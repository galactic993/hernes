# deploy-staging.yml — main への push（または手動）で Staging へデプロイ。
#
# Staging は Preview と完全分離:
#   - DB: Cloud SQL for PostgreSQL（Neon ではない）。
#   - Redis(Memorystore): 有効（REDIS_ENABLED=true）。Cloud Run からは Direct VPC egress。
#   - GCS: staging バケット。
#   - Secret 値: GCP Secret Manager(staging)。GCP は WIF(staging)。
#
# 規約: backend は Hono(TS)。set -x 禁止 / secret を echo しない /
#       DATABASE_URL・CLERK_SECRET_KEY をログに出さない。
name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  APP_NAME: ${{ vars.APP_NAME }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  # 非機密の設定値（env-suffixed な vars.* を、ステップが使う素の env 名へマップ）。
  CLOUDSQL_STAGING_INSTANCE: ${{ vars.CLOUDSQL_STAGING_INSTANCE }}
  VPC_NETWORK: ${{ vars.VPC_NETWORK }}
  VPC_SUBNET: ${{ vars.VPC_SUBNET }}
  REDIS_HOST: ${{ vars.REDIS_HOST_STAGING }}
  REDIS_PORT: ${{ vars.REDIS_PORT_STAGING }}
  ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS_STAGING }}
  CLERK_JWKS_URL: ${{ vars.CLERK_JWKS_URL_STAGING }}
  CLERK_ISSUER: ${{ vars.CLERK_ISSUER_STAGING }}
  CLERK_AUTHORIZED_PARTIES: ${{ vars.CLERK_AUTHORIZED_PARTIES_STAGING }}
  VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY_STAGING }}

jobs:
  deploy:
    name: Build, migrate & deploy (staging)
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      backend_url: ${{ steps.backend-url.outputs.url }}
      frontend_url: ${{ steps.frontend-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- GCP 認証（WIF / staging） ---
      - name: Authenticate to Google Cloud (WIF / staging)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_STAGING }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT_STAGING }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev" --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- backend build/push ---
      - name: Resolve backend image tag
        id: backend-image
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-backend/backend
        run: |
          tag="staging-${GITHUB_SHA::12}"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.backend-image.outputs.image }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=staging
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,mode=max,scope=backend-staging

      # --- DB migration（Cloud SQL staging）を Cloud Run Job で実行 ---
      # backend runtime イメージは drizzle-kit を持たないため、migration 専用イメージ
      # （Dockerfile の migrate ステージ）でマイグレーションする。DATABASE_URL は Job が
      # Secret Manager から --update-secrets で読むので、GitHub runner には一切降ろさない。
      - name: Resolve migration image tag
        id: migrate-image
        if: ${{ vars.RUN_DB_MIGRATIONS == 'true' }}
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-backend/migrate
        run: |
          tag="staging-${GITHUB_SHA::12}"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Build & push migration image
        if: ${{ vars.RUN_DB_MIGRATIONS == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          target: migrate
          push: true
          tags: ${{ steps.migrate-image.outputs.image }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=staging
            component=migrate
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=migrate-staging
          cache-to: type=gha,mode=max,scope=migrate-staging

      # Cloud Run Job: backend runtime SA で実行し、DATABASE_URL を Secret Manager 参照で注入。
      # private IP の Cloud SQL へは Direct VPC egress + Cloud SQL Auth Proxy 接続で到達する。
      # vars.RUN_DB_MIGRATIONS=true のときだけ実行（drizzle 未配線の scaffold では既定 off で skip）。
      - name: Run DB migrations via Cloud Run Job (Cloud SQL staging)
        if: ${{ vars.RUN_DB_MIGRATIONS == 'true' }}
        run: |
          JOB="${APP_NAME}-migrate-staging"
          gcloud run jobs deploy "${JOB}" \
            --image="${{ steps.migrate-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --service-account="${{ vars.BACKEND_RUNTIME_SA_STAGING }}" \
            --set-cloudsql-instances="${CLOUDSQL_STAGING_INSTANCE}" \
            --network="${VPC_NETWORK}" \
            --subnet="${VPC_SUBNET}" \
            --vpc-egress=private-ranges-only \
            --update-secrets="DATABASE_URL=staging-database-url:latest" \
            --set-env-vars="APP_ENV=staging" \
            --max-retries=1 \
            --task-timeout=600 \
            --labels="app=${APP_NAME},env=staging,component=migrate,managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --quiet
          gcloud run jobs execute "${JOB}" --region="${GCP_REGION}" --wait --quiet

      # --- backend deploy（Redis 有効 / Cloud SQL 接続 / Direct VPC egress） ---
      # 機密 env は --update-secrets で Secret Manager を直接参照（runner に値を残さない）。
      # runtime SA を明示し、その SA が各 secret を読めるようにする。
      - name: Deploy backend to Cloud Run (staging)
        run: |
          gcloud run deploy "backend-staging" \
            --image="${{ steps.backend-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --service-account="${{ vars.BACKEND_RUNTIME_SA_STAGING }}" \
            --add-cloudsql-instances="${CLOUDSQL_STAGING_INSTANCE}" \
            --network="${VPC_NETWORK}" \
            --subnet="${VPC_SUBNET}" \
            --vpc-egress=private-ranges-only \
            --labels="app=${APP_NAME},env=staging,managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --set-env-vars="^@@^APP_ENV=staging@@REDIS_ENABLED=true@@REDIS_HOST=${REDIS_HOST}@@REDIS_PORT=${REDIS_PORT}@@GCS_BUCKET=${{ vars.GCS_STAGING_BUCKET }}@@MAIL_MODE=mock@@PAYMENT_MODE=sandbox@@NOTIFICATION_MODE=disabled@@CLERK_JWKS_URL=${CLERK_JWKS_URL}@@CLERK_ISSUER=${CLERK_ISSUER}@@CLERK_AUTHORIZED_PARTIES=${CLERK_AUTHORIZED_PARTIES}@@ALLOWED_ORIGINS=${ALLOWED_ORIGINS}" \
            --update-secrets="DATABASE_URL=staging-database-url:latest,CLERK_SECRET_KEY=staging-clerk-secret-key:latest,CLERK_WEBHOOK_SECRET=staging-clerk-webhook-secret:latest,REDIS_AUTH_STRING=staging-redis-auth-string:latest,APP_SECRET=staging-app-secret:latest" \
            --quiet

      - name: Get backend URL
        id: backend-url
        run: |
          url="$(gcloud run services describe "backend-staging" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # --- frontend build/push（staging build-args） ---
      - name: Resolve frontend image tag
        id: frontend-image
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-frontend/frontend
        run: |
          tag="staging-${GITHUB_SHA::12}"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-image.outputs.image }}
          build-args: |
            VITE_APP_ENV=staging
            VITE_API_BASE_URL=${{ steps.backend-url.outputs.url }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=staging
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,mode=max,scope=frontend-staging

      - name: Deploy frontend to Cloud Run (staging)
        run: |
          gcloud run deploy "frontend-staging" \
            --image="${{ steps.frontend-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --labels="app=${APP_NAME},env=staging,managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --quiet

      - name: Get frontend URL
        id: frontend-url
        run: |
          url="$(gcloud run services describe "frontend-staging" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # --- smoke ---
      - name: Smoke test backend
        run: scripts/smoke/backend.sh "${{ steps.backend-url.outputs.url }}"

      - name: Smoke test frontend
        run: scripts/smoke/frontend.sh "${{ steps.frontend-url.outputs.url }}"

      # --- summary ---
      - name: Summary
        run: |
          {
            echo "## Staging deploy"
            echo ""
            echo "| service | url |"
            echo "| --- | --- |"
            echo "| frontend | ${{ steps.frontend-url.outputs.url }} |"
            echo "| backend  | ${{ steps.backend-url.outputs.url }} |"
            echo ""
            echo "- commit: \`${GITHUB_SHA}\`"
            echo "- Redis: enabled / DB: Cloud SQL (staging)"
          } >> "$GITHUB_STEP_SUMMARY"
