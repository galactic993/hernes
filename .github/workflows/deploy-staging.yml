# deploy-staging.yml — main への push（または手動）で Staging へデプロイ。
#
# Staging は Preview と完全分離:
#   - DB: Cloud SQL for PostgreSQL（Neon ではない）。
#   - Redis(Memorystore): 有効（REDIS_ENABLED=true）。Cloud Run からは Direct VPC egress。
#   - GCS: staging バケット。
#   - Secrets: Infisical(staging)。GCP は WIF(staging)。
#
# 規約: backend は Hono(TS)。set -x 禁止 / secret を echo しない /
#       DATABASE_URL・CLERK_SECRET_KEY をログに出さない。
name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  APP_NAME: ${{ vars.APP_NAME }}
  GCP_REGION: ${{ vars.GCP_REGION }}

jobs:
  deploy:
    name: Build, migrate & deploy (staging)
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      backend_url: ${{ steps.backend-url.outputs.url }}
      frontend_url: ${{ steps.frontend-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Infisical(staging) ---
      - name: Fetch secrets from Infisical (staging)
        uses: Infisical/secrets-action@v1
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID_STAGING }}
          domain: ${{ vars.INFISICAL_DOMAIN }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: staging
          export-type: env

      # --- GCP 認証（WIF / staging） ---
      - name: Authenticate to Google Cloud (WIF / staging)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_STAGING }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT_STAGING }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev" --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- backend build/push ---
      - name: Resolve backend image tag
        id: backend-image
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-backend/backend
        run: |
          tag="staging-${GITHUB_SHA::12}"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.backend-image.outputs.image }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=staging
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,mode=max,scope=backend-staging

      # --- DB migration（Cloud SQL staging） ---
      # 推奨: Cloud SQL Auth Proxy 経由（Public IP を晒さない）。
      # DATABASE_URL は Infisical(staging) から。値はログへ出さない。
      - name: Start Cloud SQL Auth Proxy
        run: |
          curl -fsSL -o /usr/local/bin/cloud-sql-proxy \
            "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64"
          chmod +x /usr/local/bin/cloud-sql-proxy
          # CLOUDSQL_STAGING_INSTANCE = project:region:instance（Infisical or vars）。
          cloud-sql-proxy --port 5432 "${CLOUDSQL_STAGING_INSTANCE}" &
          echo "PROXY_PID=$!" >> "$GITHUB_ENV"
          # proxy が listen するまで待機。
          for i in $(seq 1 30); do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Run DB migrations (Cloud SQL staging)
        env:
          # proxy 経由のローカル接続文字列。資格情報は Infisical の値を使う。
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: scripts/db/migrate.sh

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: kill "${PROXY_PID}" 2>/dev/null || true

      # --- backend deploy（Redis 有効 / Cloud SQL 接続 / Direct VPC egress） ---
      - name: Deploy backend to Cloud Run (staging)
        run: |
          gcloud run deploy "backend-staging" \
            --image="${{ steps.backend-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --add-cloudsql-instances="${CLOUDSQL_STAGING_INSTANCE}" \
            --network="${VPC_NETWORK}" \
            --subnet="${VPC_SUBNET}" \
            --vpc-egress=private-ranges-only \
            --labels="app=${APP_NAME},env=staging,managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --set-env-vars="APP_ENV=staging,REDIS_ENABLED=true,REDIS_HOST=${REDIS_HOST},REDIS_PORT=${REDIS_PORT},GCS_BUCKET=${{ vars.GCS_STAGING_BUCKET }},MAIL_MODE=mock,PAYMENT_MODE=sandbox,NOTIFICATION_MODE=disabled,CLERK_JWKS_URL=${CLERK_JWKS_URL},CLERK_ISSUER=${CLERK_ISSUER},ALLOWED_ORIGINS=${ALLOWED_ORIGINS}" \
            --quiet
          # 機密 env（DATABASE_URL / Clerk secrets）は別ステップで注入。
          gcloud run services update "backend-staging" \
            --region="${GCP_REGION}" \
            --update-env-vars="^@@^DATABASE_URL=${DATABASE_URL}@@CLERK_SECRET_KEY=${CLERK_SECRET_KEY}@@CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}" \
            --quiet

      - name: Get backend URL
        id: backend-url
        run: |
          url="$(gcloud run services describe "backend-staging" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # --- frontend build/push（staging build-args） ---
      - name: Resolve frontend image tag
        id: frontend-image
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-frontend/frontend
        run: |
          tag="staging-${GITHUB_SHA::12}"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-image.outputs.image }}
          build-args: |
            VITE_APP_ENV=staging
            VITE_API_BASE_URL=${{ steps.backend-url.outputs.url }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ env.CLERK_PUBLISHABLE_KEY }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=staging
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,mode=max,scope=frontend-staging

      - name: Deploy frontend to Cloud Run (staging)
        run: |
          gcloud run deploy "frontend-staging" \
            --image="${{ steps.frontend-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --labels="app=${APP_NAME},env=staging,managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --quiet

      - name: Get frontend URL
        id: frontend-url
        run: |
          url="$(gcloud run services describe "frontend-staging" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # --- smoke ---
      - name: Smoke test backend
        run: scripts/smoke/backend.sh "${{ steps.backend-url.outputs.url }}"

      - name: Smoke test frontend
        run: scripts/smoke/frontend.sh "${{ steps.frontend-url.outputs.url }}"

      # --- summary ---
      - name: Summary
        run: |
          {
            echo "## Staging deploy"
            echo ""
            echo "| service | url |"
            echo "| --- | --- |"
            echo "| frontend | ${{ steps.frontend-url.outputs.url }} |"
            echo "| backend  | ${{ steps.backend-url.outputs.url }} |"
            echo ""
            echo "- commit: \`${GITHUB_SHA}\`"
            echo "- Redis: enabled / DB: Cloud SQL (staging)"
          } >> "$GITHUB_STEP_SUMMARY"
