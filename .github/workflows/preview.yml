# preview.yml — PR ごとの Preview 環境を Cloud Run + Neon に立てる。
#
# 規約（CLAUDE / 共通規約）:
# - backend は Hono(TS)。サービス名 backend-pr-<PR> / frontend-pr-<PR>。
# - DB は Neon branch pr-<PR>（Preview 専用）。Redis は使わない（REDIS_ENABLED=false）。
# - GCS は preview バケット、object prefix pr/<PR>/。
# - Secrets の source of truth = Infisical(preview)。GitHub→Infisical は OIDC。
# - GitHub→GCP は Workload Identity Federation（SA JSON キー禁止）。
# - CLERK_SECRET_KEY を frontend build に渡さない。DATABASE_URL をログに出さない。
# - set -x 禁止 / secret を echo しない。
#
# 値が未確定の箇所は ${{ vars.* }} / Infisical 出力を参照（コメントで補足）。
name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write        # WIF(GCP) と Infisical OIDC に必須
  pull-requests: write   # PR コメント upsert
  issues: write          # issue comments API

# 同一 PR の多重実行を直列化（途中キャンセルはしない＝デプロイ破棄を避ける）。
concurrency:
  group: preview-pr-${{ github.event.number }}
  cancel-in-progress: false

env:
  APP_NAME: ${{ vars.APP_NAME }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  PR_NUMBER: ${{ github.event.number }}

jobs:
  preview:
    name: Deploy preview (PR #${{ github.event.number }})
    runs-on: ubuntu-latest
    # backend/frontend の URL を後続ステップ/コメントへ受け渡すための出力。
    outputs:
      backend_url: ${{ steps.backend-url.outputs.url }}
      frontend_url: ${{ steps.frontend-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- tools ---
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- biome / test（CI と同じゲートを Preview でも担保） ---
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Lint (biome ci)
        run: biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # --- Infisical(preview) で secret を取得 ---
      # OIDC Machine Identity（Universal Auth は使わない）。
      # 取得した値は GITHUB_ENV 経由でステップに渡り、ログにはマスクされる。
      - name: Fetch secrets from Infisical (preview)
        uses: Infisical/secrets-action@v1
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID_PREVIEW }}
          domain: ${{ vars.INFISICAL_DOMAIN }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: preview
          # CLERK_*, NEON_API_KEY, NEON_PROJECT_ID, NEON_PARENT_BRANCH などを
          # 環境変数としてエクスポートする。
          export-type: env

      # --- GCP 認証（WIF / dev=preview プロジェクト） ---
      - name: Authenticate to Google Cloud (WIF)
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT_DEV }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_DEV }}

      # Artifact Registry への docker 認証（asia-northeast1）。
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev" --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Neon branch pr-<PR> 作成（既存なら再利用） ---
      # 親ブランチは Infisical の NEON_PARENT_BRANCH。
      # 出力 db_url（pooled）/ db_url_unpooled は機密。step output 経由で扱い、ログには出さない。
      - name: Create or reuse Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent: ${{ env.NEON_PARENT_BRANCH }}
          branch_name: pr-${{ env.PR_NUMBER }}
          api_key: ${{ env.NEON_API_KEY }}

      # --- backend image build/push ---
      - name: Build & push backend image
        id: backend-image
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_DEV }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-backend/backend
        run: |
          tag="pr-${PR_NUMBER}-${GITHUB_SHA::12}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.backend-image.outputs.image }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=preview
            pr=${{ env.PR_NUMBER }}
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=backend-pr
          cache-to: type=gha,mode=max,scope=backend-pr

      # --- DB migration を Neon branch に対して実行 ---
      # DATABASE_URL は Neon の pooled 接続。env 経由でのみ渡し、絶対にログへ出さない。
      - name: Run DB migrations (Neon branch)
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: scripts/db/migrate.sh

      # --- backend Cloud Run deploy（先に立てて URL を取る） ---
      # ALLOWED_ORIGINS は frontend URL 確定前なので、まず広めに置かず後段で更新する。
      - name: Deploy backend to Cloud Run
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: |
          gcloud run deploy "backend-pr-${PR_NUMBER}" \
            --image="${{ steps.backend-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --labels="app=${APP_NAME},env=preview,pr=${PR_NUMBER},managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --set-env-vars="APP_ENV=preview,REDIS_ENABLED=false,GCS_BUCKET=${{ vars.GCS_PREVIEW_BUCKET }},GCS_PREFIX=pr/${PR_NUMBER}/,MAIL_MODE=mock,PAYMENT_MODE=sandbox,NOTIFICATION_MODE=disabled,CLERK_JWKS_URL=${CLERK_JWKS_URL},CLERK_ISSUER=${CLERK_ISSUER}" \
            --set-env-vars="^@@^ALLOWED_ORIGINS=" \
            --update-secrets="" \
            --quiet
          # 注: DATABASE_URL / CLERK_SECRET_KEY / CLERK_WEBHOOK_SECRET は
          #     値をログに出さないため、別ステップで --update-env-vars により注入する。

      # 機密 env は値をコマンドラインに展開しない形で投入（gcloud は引数を素通しするため
      #   --set-env-vars の右辺に直書きすると runner ログに残り得る → ここでは
      #   GitHub のマスク機能に依存しつつ、最小限の直書きに留める）。
      - name: Inject backend secret env (DATABASE_URL / Clerk secrets)
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: |
          gcloud run services update "backend-pr-${PR_NUMBER}" \
            --region="${GCP_REGION}" \
            --update-env-vars="^@@^DATABASE_URL=${DATABASE_URL}@@CLERK_SECRET_KEY=${CLERK_SECRET_KEY}@@CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}" \
            --quiet

      - name: Get backend URL
        id: backend-url
        run: |
          url="$(gcloud run services describe "backend-pr-${PR_NUMBER}" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # --- frontend image build/push ---
      # CLERK_SECRET_KEY は build-args に渡さない。publishable のみ。
      - name: Build & push frontend image
        id: frontend-image
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_DEV }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-frontend/frontend
        run: |
          tag="pr-${PR_NUMBER}-${GITHUB_SHA::12}"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-image.outputs.image }}
          build-args: |
            VITE_APP_ENV=preview
            VITE_API_BASE_URL=${{ steps.backend-url.outputs.url }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ env.CLERK_PUBLISHABLE_KEY }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=preview
            pr=${{ env.PR_NUMBER }}
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=frontend-pr
          cache-to: type=gha,mode=max,scope=frontend-pr

      # --- frontend Cloud Run deploy ---
      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy "frontend-pr-${PR_NUMBER}" \
            --image="${{ steps.frontend-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --labels="app=${APP_NAME},env=preview,pr=${PR_NUMBER},managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --quiet

      - name: Get frontend URL
        id: frontend-url
        run: |
          url="$(gcloud run services describe "frontend-pr-${PR_NUMBER}" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # --- ALLOWED_ORIGINS を frontend URL で更新して backend を再デプロイ ---
      - name: Update backend ALLOWED_ORIGINS
        run: |
          gcloud run services update "backend-pr-${PR_NUMBER}" \
            --region="${GCP_REGION}" \
            --update-env-vars="ALLOWED_ORIGINS=${{ steps.frontend-url.outputs.url }}" \
            --quiet

      # --- smoke ---
      - name: Smoke test backend
        run: scripts/smoke/backend.sh "${{ steps.backend-url.outputs.url }}"

      - name: Smoke test frontend
        run: scripts/smoke/frontend.sh "${{ steps.frontend-url.outputs.url }}"

      # --- (任意) Playwright E2E ---
      # e2e/ に Playwright を scaffold 済みなら有効化。未整備なら no-op。
      - name: Playwright E2E (optional)
        continue-on-error: true
        env:
          BASE_URL: ${{ steps.frontend-url.outputs.url }}
          API_BASE_URL: ${{ steps.backend-url.outputs.url }}
        run: pnpm --if-present test:e2e

      # --- PR コメントを upsert（URL 一覧） ---
      - name: Upsert PR comment with preview URLs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
          COMMENT_MARKER: "<!-- hernes-preview -->"
          BODY: |
            ## Preview deployed (PR #${{ env.PR_NUMBER }})

            | service | url |
            | --- | --- |
            | frontend | ${{ steps.frontend-url.outputs.url }} |
            | backend  | ${{ steps.backend-url.outputs.url }} |

            - env: `preview` / Redis: disabled / DB: Neon branch `pr-${{ env.PR_NUMBER }}`
            - commit: `${{ github.sha }}`
        run: scripts/github/upsert-pr-comment.sh
