# preview.yml — PR ごとの Preview 環境を Cloud Run + Neon に立てる。
#
# 規約（CLAUDE / 共通規約）:
# - backend は Hono(TS)。サービス名 backend-pr-<PR> / frontend-pr-<PR>。
# - DB は Neon branch pr-<PR>（Preview 専用）。Redis は使わない（REDIS_ENABLED=false）。
# - GCS は preview バケット、object prefix pr/<PR>/。
# - Secret 値の source of truth = GCP Secret Manager(dev/preview)。
# - GitHub→GCP は Workload Identity Federation（SA JSON キー禁止）。
# - CLERK_SECRET_KEY を frontend build に渡さない。DATABASE_URL をログに出さない。
# - set -x 禁止 / secret を echo しない。
#
# 非機密の設定値は ${{ vars.* }}、機密値は Secret Manager を参照（コメントで補足）。
name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write        # WIF(GCP) に必須
  pull-requests: write   # PR コメント upsert
  issues: write          # issue comments API

# 同一 PR の多重実行を直列化（途中キャンセルはしない＝デプロイ破棄を避ける）。
concurrency:
  group: preview-pr-${{ github.event.number }}
  cancel-in-progress: false

env:
  APP_NAME: ${{ vars.APP_NAME }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  PR_NUMBER: ${{ github.event.number }}
  # Neon の非機密設定（API キーは Secret Manager から別途取得）。
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  NEON_PARENT_BRANCH: ${{ vars.NEON_PARENT_BRANCH }}
  # Clerk 公開設定（preview）。いずれも非機密。
  CLERK_JWKS_URL: ${{ vars.CLERK_JWKS_URL_PREVIEW }}
  CLERK_ISSUER: ${{ vars.CLERK_ISSUER_PREVIEW }}
  # azp（authorized parties）チェック用。カンマ区切りの許可 azp 一覧（非機密）。
  CLERK_AUTHORIZED_PARTIES: ${{ vars.CLERK_AUTHORIZED_PARTIES_PREVIEW }}
  VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY_PREVIEW }}

jobs:
  preview:
    name: Deploy preview (PR #${{ github.event.number }})
    runs-on: ubuntu-latest
    # backend/frontend の URL を後続ステップ/コメントへ受け渡すための出力。
    outputs:
      backend_url: ${{ steps.backend-url.outputs.url }}
      frontend_url: ${{ steps.frontend-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- tools ---
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- biome / test（CI と同じゲートを Preview でも担保） ---
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Lint (biome ci)
        run: biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # --- GCP 認証（WIF / dev=preview プロジェクト） ---
      - name: Authenticate to Google Cloud (WIF)
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT_DEV }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_DEV }}

      # --- Neon API キーを Secret Manager から取得 ---
      # ワークフロー自身が Neon branch を作成するため、この値だけは runner に降ろす。
      # 取得後は即座にマスクし、GITHUB_ENV 経由でのみ参照する（echo しない）。
      - name: Read NEON_API_KEY from Secret Manager
        run: |
          NEON_API_KEY="$(gcloud secrets versions access latest --secret=preview-neon-api-key)"
          echo "::add-mask::${NEON_API_KEY}"
          echo "NEON_API_KEY=${NEON_API_KEY}" >> "$GITHUB_ENV"

      # Artifact Registry への docker 認証（asia-northeast1）。
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev" --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Neon branch pr-<PR> 作成（既存なら再利用） ---
      # 親ブランチは vars.NEON_PARENT_BRANCH（非機密）。API キーは Secret Manager 由来。
      # 出力 db_url（pooled）/ db_url_unpooled は機密。step output 経由で扱い、ログには出さない。
      - name: Create or reuse Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent: ${{ env.NEON_PARENT_BRANCH }}
          branch_name: pr-${{ env.PR_NUMBER }}
          api_key: ${{ env.NEON_API_KEY }}

      # Neon の接続文字列（db_url / db_url_unpooled）を以降の全ステップで確実にマスクする。
      # （migration ツール等が失敗時に接続文字列をログ出力しても GitHub が redact する。）
      - name: Mask Neon connection strings
        env:
          DB_URL: ${{ steps.neon.outputs.db_url }}
          DB_URL_UNPOOLED: ${{ steps.neon.outputs.db_url_unpooled }}
        run: |
          [[ -n "${DB_URL}" ]] && echo "::add-mask::${DB_URL}"
          [[ -n "${DB_URL_UNPOOLED}" ]] && echo "::add-mask::${DB_URL_UNPOOLED}"
          true

      # --- backend image build/push ---
      - name: Build & push backend image
        id: backend-image
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_DEV }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-backend/backend
        run: |
          tag="pr-${PR_NUMBER}-${GITHUB_SHA::12}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.backend-image.outputs.image }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=preview
            pr=${{ env.PR_NUMBER }}
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=backend-pr
          cache-to: type=gha,mode=max,scope=backend-pr

      # --- DB migration を Neon branch に対して実行 ---
      # vars.RUN_DB_MIGRATIONS=true のときだけ実行（drizzle 未配線の scaffold では既定 off で skip）。
      # DATABASE_URL は Neon の pooled 接続（このブランチ自身の URL）。env 経由でのみ渡す。
      - name: Run DB migrations (Neon branch)
        if: ${{ vars.RUN_DB_MIGRATIONS == 'true' }}
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: scripts/db/migrate.sh

      # --- per-PR の DATABASE_URL を Secret Manager に保存し、runtime SA に accessor 付与 ---
      # backend は Cloud Run の --update-secrets でこの secret を直接参照する（runner に値を残さない）。
      # 値は Neon step output 由来。argv/echo に出さず、--data-file=- 経由でのみ書き込む。
      - name: Upsert per-PR DATABASE_URL secret & grant accessor
        env:
          DB_URL: ${{ steps.neon.outputs.db_url }}
        run: |
          SECRET="preview-pr-${PR_NUMBER}-database-url"
          echo "::add-mask::${DB_URL}"
          if gcloud secrets describe "${SECRET}" >/dev/null 2>&1; then
            printf '%s' "${DB_URL}" | gcloud secrets versions add "${SECRET}" --data-file=-
          else
            printf '%s' "${DB_URL}" | gcloud secrets create "${SECRET}" \
              --replication-policy=automatic --data-file=- \
              --labels="app=${APP_NAME},env=preview,pr=${PR_NUMBER},managed-by=github-actions"
          fi
          gcloud secrets add-iam-policy-binding "${SECRET}" \
            --member="serviceAccount:${{ vars.BACKEND_RUNTIME_SA_DEV }}" \
            --role="roles/secretmanager.secretAccessor" --quiet

      # --- backend Cloud Run deploy（先に立てて URL を取る） ---
      # ALLOWED_ORIGINS は frontend URL 確定前なので、まず広めに置かず後段で更新する。
      # 機密 env は --update-secrets で Secret Manager を直接参照（runner に値を残さない）。
      # runtime SA を明示し、その SA が各 secret を読めるようにする。
      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy "backend-pr-${PR_NUMBER}" \
            --image="${{ steps.backend-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --service-account="${{ vars.BACKEND_RUNTIME_SA_DEV }}" \
            --labels="app=${APP_NAME},env=preview,pr=${PR_NUMBER},managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --set-env-vars="^@@^APP_ENV=preview@@REDIS_ENABLED=false@@GCS_BUCKET=${{ vars.GCS_PREVIEW_BUCKET }}@@GCS_PREFIX=pr/${PR_NUMBER}/@@MAIL_MODE=mock@@PAYMENT_MODE=sandbox@@NOTIFICATION_MODE=disabled@@CLERK_JWKS_URL=${CLERK_JWKS_URL}@@CLERK_ISSUER=${CLERK_ISSUER}@@CLERK_AUTHORIZED_PARTIES=${CLERK_AUTHORIZED_PARTIES}" \
            --update-secrets="DATABASE_URL=preview-pr-${PR_NUMBER}-database-url:latest,CLERK_SECRET_KEY=preview-clerk-secret-key:latest,CLERK_WEBHOOK_SECRET=preview-clerk-webhook-secret:latest,APP_SECRET=preview-app-secret:latest" \
            --quiet

      - name: Get backend URL
        id: backend-url
        run: |
          url="$(gcloud run services describe "backend-pr-${PR_NUMBER}" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # --- frontend image build/push ---
      # CLERK_SECRET_KEY は build-args に渡さない。publishable のみ。
      - name: Build & push frontend image
        id: frontend-image
        env:
          IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_DEV }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}-frontend/frontend
        run: |
          tag="pr-${PR_NUMBER}-${GITHUB_SHA::12}"
          echo "image=${IMAGE}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-image.outputs.image }}
          build-args: |
            VITE_APP_ENV=preview
            VITE_API_BASE_URL=${{ steps.backend-url.outputs.url }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          labels: |
            app=${{ vars.APP_NAME }}
            env=preview
            pr=${{ env.PR_NUMBER }}
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          cache-from: type=gha,scope=frontend-pr
          cache-to: type=gha,mode=max,scope=frontend-pr

      # --- frontend Cloud Run deploy ---
      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy "frontend-pr-${PR_NUMBER}" \
            --image="${{ steps.frontend-image.outputs.image }}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --labels="app=${APP_NAME},env=preview,pr=${PR_NUMBER},managed-by=github-actions,commit-sha=${GITHUB_SHA}" \
            --quiet

      - name: Get frontend URL
        id: frontend-url
        run: |
          url="$(gcloud run services describe "frontend-pr-${PR_NUMBER}" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # --- ALLOWED_ORIGINS を frontend URL で更新して backend を再デプロイ ---
      - name: Update backend ALLOWED_ORIGINS
        run: |
          gcloud run services update "backend-pr-${PR_NUMBER}" \
            --region="${GCP_REGION}" \
            --update-env-vars="ALLOWED_ORIGINS=${{ steps.frontend-url.outputs.url }}" \
            --quiet

      # --- smoke ---
      - name: Smoke test backend
        run: scripts/smoke/backend.sh "${{ steps.backend-url.outputs.url }}"

      - name: Smoke test frontend
        run: scripts/smoke/frontend.sh "${{ steps.frontend-url.outputs.url }}"

      # --- (任意) Playwright E2E ---
      # e2e/ に Playwright を scaffold 済みなら有効化。未整備なら no-op。
      - name: Playwright E2E (optional)
        continue-on-error: true
        env:
          BASE_URL: ${{ steps.frontend-url.outputs.url }}
          API_BASE_URL: ${{ steps.backend-url.outputs.url }}
        run: pnpm --if-present test:e2e

      # --- PR コメントを upsert（URL 一覧） ---
      - name: Upsert PR comment with preview URLs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
          COMMENT_MARKER: "<!-- hernes-preview -->"
          BODY: |
            ## Preview deployed (PR #${{ env.PR_NUMBER }})

            | service | url |
            | --- | --- |
            | frontend | ${{ steps.frontend-url.outputs.url }} |
            | backend  | ${{ steps.backend-url.outputs.url }} |

            - env: `preview` / Redis: disabled / DB: Neon branch `pr-${{ env.PR_NUMBER }}`
            - commit: `${{ github.sha }}`
        run: scripts/github/upsert-pr-comment.sh
