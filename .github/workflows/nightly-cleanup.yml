# nightly-cleanup.yml — orphan な Preview リソースを毎日掃除する。
#
# 突合ロジック:
#   - open な PR 番号一覧を取得。
#   - env=preview / managed-by=github-actions ラベルの Cloud Run *-pr-* サービスを列挙。
#   - open PR に対応しない *-pr-<N> サービスを orphan として削除。
#   - orphan な Neon branch（pr-*）も同様に削除。
#
# 安全ガード（厳守）:
#   - *-pr-* / pr-* パターンのみを対象。staging/prod の name/branch には一切作用しない。
#   - dev/preview の project / secret のみアクセス。
#   - set -x 禁止 / secret を echo しない。
name: Nightly Cleanup

on:
  schedule:
    - cron: '17 18 * * *'   # 毎日 18:17 UTC（= JST 03:17）。深夜帯に実行。
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: nightly-cleanup
  cancel-in-progress: false

env:
  APP_NAME: ${{ vars.APP_NAME }}
  GCP_REGION: ${{ vars.GCP_REGION }}

jobs:
  cleanup:
    name: Reap orphan preview resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch secrets from Infisical (preview)
        uses: Infisical/secrets-action@v1
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID_PREVIEW }}
          domain: ${{ vars.INFISICAL_DOMAIN }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: preview
          export-type: env

      - name: Authenticate to Google Cloud (WIF / dev)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT_DEV }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_DEV }}

      # open PR 一覧を取得（番号のみ）。gh はランナー同梱。
      - name: List open PR numbers
        id: open-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_prs="$(gh pr list --repo "${{ github.repository }}" --state open --limit 1000 \
            --json number --jq '.[].number' | tr '\n' ' ')"
          echo "Open PRs: ${open_prs:-<none>}"
          echo "numbers=${open_prs}" >> "$GITHUB_OUTPUT"

      # --- orphan Cloud Run サービス削除 ---
      - name: Delete orphan Cloud Run preview services
        env:
          OPEN_PRS: ${{ steps.open-prs.outputs.numbers }}
        run: |
          # env=preview & managed-by=github-actions ラベルのサービス名を列挙。
          mapfile -t services < <(gcloud run services list \
            --region="${GCP_REGION}" \
            --filter="metadata.labels.env=preview AND metadata.labels.managed-by=github-actions" \
            --format='value(metadata.name)')

          for svc in "${services[@]}"; do
            [[ -z "${svc}" ]] && continue
            # ガード: *-pr-<digits> のみ対象。staging/prod 名は弾く。
            if [[ ! "${svc}" =~ ^(frontend|backend)-pr-([0-9]+)$ ]]; then
              echo "skip (not a *-pr-<N> service): ${svc}"
              continue
            fi
            pr="${BASH_REMATCH[2]}"
            # open PR なら残す。
            if [[ " ${OPEN_PRS} " == *" ${pr} "* ]]; then
              echo "keep ${svc} (PR #${pr} is open)"
              continue
            fi
            echo "Deleting orphan service ${svc} (PR #${pr} is not open) ..."
            gcloud run services delete "${svc}" --region="${GCP_REGION}" --quiet || \
              echo "::warning::failed to delete ${svc}; will retry next run."
          done

      # --- orphan Neon branch 削除 ---
      # Neon API でブランチ一覧を取り、pr-<N> 形式かつ open PR に無いものを削除。
      - name: Delete orphan Neon branches
        env:
          OPEN_PRS: ${{ steps.open-prs.outputs.numbers }}
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y jq
          fi
          # NEON_API_KEY / NEON_PROJECT_ID は Infisical(preview) 由来。値はログへ出さない。
          branches_json="$(curl -fsS \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Accept: application/json" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches")"

          # name が pr-<digits> のものだけ抽出。
          mapfile -t branches < <(echo "${branches_json}" \
            | jq -r '.branches[] | "\(.id) \(.name)"')

          for entry in "${branches[@]}"; do
            [[ -z "${entry}" ]] && continue
            bid="${entry%% *}"
            bname="${entry#* }"
            if [[ ! "${bname}" =~ ^pr-([0-9]+)$ ]]; then
              continue   # 親ブランチ等は対象外
            fi
            pr="${BASH_REMATCH[1]}"
            if [[ " ${OPEN_PRS} " == *" ${pr} "* ]]; then
              echo "keep Neon branch ${bname} (PR #${pr} is open)"
              continue
            fi
            echo "Deleting orphan Neon branch ${bname} (PR #${pr} not open) ..."
            curl -fsS -X DELETE \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${bid}" \
              >/dev/null || echo "::warning::failed to delete Neon branch ${bname}; retry next run."
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Nightly cleanup"
            echo ""
            echo "- Open PRs: ${{ steps.open-prs.outputs.numbers }}"
            echo "- Reaped orphan *-pr-* Cloud Run services and pr-* Neon branches."
            echo "- staging / production resources were never touched."
          } >> "$GITHUB_STEP_SUMMARY"
